name: Update Financial Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (11 PM MST)
  workflow_dispatch:  # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch financial data
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python data/fetch_financials.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csv/
          git diff --staged --quiet || git commit -m "📊 Update financial data $(date -u +%Y-%m-%d)"
          git push
